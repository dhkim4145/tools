<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>업무 분석 도구</title>
  <link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Noto+Sans+KR:wght@300;400;500;600;700&family=JetBrains+Mono:wght@400;600&display=swap">
  <link rel="stylesheet" href="css/common.css">
  <style>
    /* 홈 섹션 레이아웃 */
    #app-home {
      padding: 40px 24px 60px;
      background: #f0f2f5;
      min-height: calc(100vh - 56px);
      font-family: 'Noto Sans KR', sans-serif;
    }
    #app-home .home-inner { max-width: 900px; margin: 0 auto; }
    #app-home .home-title { font-size: 1.75rem; font-weight: 700; color: #1a3a6b; margin-bottom: 8px; }
    #app-home .home-subtitle { font-size: 0.95rem; color: #6b7280; margin-bottom: 32px; }
    #app-home .home-cards { display: grid; grid-template-columns: repeat(auto-fill, minmax(260px, 1fr)); gap: 20px; }
    #app-home .home-card {
      background: #fff;
      border-radius: 14px;
      padding: 28px 24px;
      box-shadow: 0 4px 24px rgba(26,58,107,0.1);
      border: 2px solid transparent;
      cursor: pointer;
      transition: all 0.2s;
      text-align: left;
      text-decoration: none;
      color: inherit;
      display: block;
    }
    #app-home .home-card:hover {
      border-color: #2854a0;
      background: #edf2fb;
      box-shadow: 0 6px 28px rgba(26,58,107,0.14);
    }
    #app-home .home-card:focus-visible {
      outline: 2px solid #2854a0;
      outline-offset: 2px;
    }
    #app-home .home-card-icon { font-size: 2rem; margin-bottom: 12px; }
    #app-home .home-card h3 {
      font-size: 1.1rem;
      font-weight: 700;
      color: #1a3a6b;
      margin: 0 0 6px;
    }
    #app-home .home-card p {
      font-size: 0.88rem;
      color: #6b7280;
      margin: 0;
      line-height: 1.5;
    }
    #app-home .home-card.placeholder { cursor: default; opacity: 0.75; }
    #app-home .home-card.placeholder:hover {
      border-color: transparent;
      background: #fff;
      box-shadow: 0 4px 24px rgba(26,58,107,0.1);
    }
  </style>
</head>
<body style="margin:0;font-family:'Noto Sans KR',sans-serif;">

<nav class="app-nav" role="navigation">
  <h1>업무 분석 도구</h1>
  <div class="nav-links">
    <a href="./" class="nav-link active" aria-current="page">홈</a>
    <a href="account/" class="nav-link">계정과목 증감 분석</a>
    <a href="asset/" class="nav-link">PC 실사·실사결과</a>
  </div>
</nav>

<!-- 홈(요약 대시보드) -->
<div id="app-home">
  <div class="home-inner">
    <h2 class="home-title">업무 분석 도구</h2>
    <p class="home-subtitle">
      계정·자산 관련 데이터를 한 번에 모아 보고, 반복되는 보고·실사 업무를 더 간편하게 처리할 수 있는 내부 분석 도구입니다.
    </p>
    <div class="home-cards">
      <a href="account/" class="home-card">
        <div class="home-card-icon">📊</div>
        <h3>계정과목 증감 분석</h3>
        <p>기표월별 계정과목 증감을 자동으로 집계하고, 주요 원인을 요약해 보여줍니다.</p>
      </a>
      <a href="asset/" class="home-card">
        <div class="home-card-icon">🖥️</div>
        <h3>PC 실사·실사결과</h3>
        <p>PC 실사 체크리스트 작성부터 실사 결과 통계까지 한 번에 관리할 수 있습니다.</p>
      </a>
      <div class="home-card placeholder">
        <div class="home-card-icon">✨</div>
        <h3>추가 도구 준비 중</h3>
        <p>향후 계정·자산 외 업무를 위한 분석 도구를 순차적으로 추가할 예정입니다.</p>
      </div>
    </div>
  </div>
</div>

</body>
</html>
