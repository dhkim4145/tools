<script src="../js/common.js"></script>
<script>
const CONSTANTS = { DIFF_TOLERANCE_BASE:0.01, DIFF_TOLERANCE_RATIO:0.0001, FILTER_DEBOUNCE_MS:300, MIN_DIFF_FOR_RATIO:0.01 };
let rawData=[], analysisResults=null, filterTimeout=null, sortState={column:'diff',direction:'desc'};
let accountColumnGubun=false, accountColumnCostAsset=false;

function normalizeHeader(h){ return (h||'').replace(/\uFEFF/g,'').trim(); }
function findColumn(data,targetNames,options={}){
  if(!data||data.length===0) return null;
  const keys=Object.keys(data[0]).map(k=>({raw:k,norm:normalizeHeader(k)}));
  const excludes=(options.excludes||[]).map(x=>normalizeHeader(x)).filter(Boolean);
  const isExcluded=n=>excludes.some(ex=>n.includes(ex));
  for(const t of targetNames){const tn=normalizeHeader(t);if(!tn)continue;const h=keys.find(k=>k.norm===tn&&!isExcluded(k.norm));if(h)return h.raw;}
  for(const t of targetNames){const tn=normalizeHeader(t);if(!tn)continue;const c=keys.filter(k=>!isExcluded(k.norm)).filter(k=>k.norm.includes(tn)||tn.includes(k.norm)).sort((a,b)=>a.norm.length-b.norm.length);if(c.length)return c[0].raw;}
  return null;
}
function detectDelimiter(text){
  const s=text.split('\n').slice(0,5).join('\n');
  const counts={',':0,';':0,'\t':0};
  [',',';','\t'].forEach(d=>{let q=false,c=0;for(let i=0;i<s.length;i++){if(s[i]==='"')q=!q;else if(s[i]===d&&!q)c++;}counts[d]=c;});
  return Object.entries(counts).sort((a,b)=>b[1]-a[1])[0][0];
}
function parseCSV(text,delim){
  const lines=[];let cur=[],f='',q=false;
  for(let i=0;i<text.length;i++){
    const c=text[i];
    if(c==='"'){if(q&&text[i+1]==='"'){f+='"';i++;}else q=!q;}
    else if(c===delim&&!q){cur.push(f.trim());f='';}
    else if((c==='\n'||c==='\r')&&!q){if(f||cur.length>0){cur.push(f.trim());lines.push(cur);cur=[];f='';}if(c==='\r'&&text[i+1]==='\n')i++;}
    else f+=c;
  }
  if(f||cur.length>0){cur.push(f.trim());lines.push(cur);}
  return lines;
}
function csvToObjects(csvLines){
  if(csvLines.length<2)return[];
  const headers=csvLines[0],objs=[];
  for(let i=1;i<csvLines.length;i++){const r=csvLines[i];if(!r.length)continue;const o={};headers.forEach((h,j)=>{o[h.replace(/\uFEFF/g,'').trim()]=r[j]||'';});objs.push(o);}
  return objs;
}
function extractMonth(d){
  if(d==null||d===undefined)return null;
  if(d instanceof Date){const y=d.getFullYear(),m=d.getMonth()+1;return !isNaN(y)&&!isNaN(m)?`${y}-${String(m).padStart(2,'0')}`:null;}
  if(typeof d==='number'){let date=new Date((d-25569)*86400*1000);if(!isNaN(date.getTime())){const y=date.getFullYear(),m=date.getMonth()+1;return `${y}-${String(m).padStart(2,'0')}`;}date=new Date(d);if(!isNaN(date.getTime())){const y=date.getFullYear(),m=date.getMonth()+1;return `${y}-${String(m).padStart(2,'0')}`;}return null;}
  const s=String(d).trim();if(!s)return null;
  const m=s.match(/(\d{4})[.\-\/](\d{1,2})/);if(m)return `${m[1]}-${String(parseInt(m[2])).padStart(2,'0')}`;
  const parsed=new Date(s);return !isNaN(parsed.getTime())?`${parsed.getFullYear()}-${String(parsed.getMonth()+1).padStart(2,'0')}`:null;
}
function normalizeMemo(m){if(!m)return'(적요없음)';return m.replace(/\s*[-\(]?\s*\d{4}년\s*\d{1,2}월\s*[\)]?/g,'').replace(/\s*[-\(]?\s*\d{4}[-\.]\d{1,2}\s*[\)]?/g,'').replace(/\s*[-\(]?\s*\d{1,2}월\s*[\)]?/g,'').trim()||'(적요없음)';}
function parseAmount(v){if(v===null||v===undefined||v==='')return 0;if(typeof v==='number')return v;if(typeof v==='string'){const c=v.replace(/,/g,'').replace(/\s/g,'').replace(/KRW|USD|원/g,'');const n=parseFloat(c);return isNaN(n)?0:n;}return 0;}
function isEmptyColumn(data,key){return data.filter(r=>r[key]!==null&&r[key]!==undefined&&r[key]!=='').length<data.length*0.1;}
function groupByAccount(data,ak,amk){const r={};data.forEach(row=>{const a=row[ak]||'(계정과목없음)';r[a]=(r[a]||0)+parseAmount(row[amk]);});return r;}
function groupByAccountMemo(data,ak,amk,mk){const r={};data.forEach(row=>{const a=row[ak]||'(계정과목없음)',m=row[mk]||'(적요없음)';if(!r[a])r[a]={};r[a][m]=(r[a][m]||0)+parseAmount(row[amk]);});return r;}
function formatNumber(n){return new Intl.NumberFormat('ko-KR').format(Math.round(n));}
function getChangedMemos(md){return(md||[]).filter(m=>(m.diff||0)!==0);}
function calculateTop3Memos(cm,sep='<br>',ratio=false){
  if(!cm||!cm.length)return sep==='<br>'?'-':'';
  const escapeMemo=sep==='<br>';
  return cm.slice().sort((a,b)=>Math.abs(b.diff)-Math.abs(a.diff)).slice(0,3).map(m=>{const s=m.diff>=0?'+':'';const r=(ratio&&m.contributionRatio!=null)?` (${m.contributionRatio}%)`:'';const memoStr=escapeMemo?escapeHtml(m.memo):(m.memo||'');return`${s}${formatNumber(m.diff)} ${memoStr}${r}`;}).join(sep)||(sep==='<br>'?'-':'');
}
function showAccountStatus(msg,type){const el=document.getElementById('accountStatus');el.textContent=msg;el.className='status '+type;el.style.display='block';}

const accountUploadZoneEl=document.getElementById('accountUploadZone');
accountUploadZoneEl.addEventListener('click',function(){ document.getElementById('accountFileInput').click(); });
accountUploadZoneEl.addEventListener('dragover',function(e){ e.preventDefault(); accountUploadZoneEl.classList.add('dragover'); });
accountUploadZoneEl.addEventListener('dragleave',function(){ accountUploadZoneEl.classList.remove('dragover'); });
accountUploadZoneEl.addEventListener('drop',function(e){ e.preventDefault(); accountUploadZoneEl.classList.remove('dragover'); if(e.dataTransfer.files[0]) accountHandleAccountFile(e.dataTransfer.files[0]); });
function accountHandleAccountFile(file){
  const statusDiv=document.getElementById('accountStatus');
  statusDiv.innerHTML='파일 로딩 중...<span class="loading"></span>';statusDiv.className='status info';statusDiv.style.display='block';
  const ext=(file.name||'').toLowerCase().split('.').pop();
  const isExcel=ext==='xlsx'||ext==='xls';

  if(isExcel){
    const reader=new FileReader();
    reader.onerror=function(){ statusDiv.querySelector('.loading')?.remove(); statusDiv.innerHTML=''; statusDiv.style.display='block'; showAccountStatus('파일을 읽을 수 없습니다.','error'); };
    reader.onload=function(ev){
      statusDiv.querySelector('.loading')?.remove();
      try{
        const wb=XLSX.read(ev.target.result,{type:'array',cellDates:true});
        const ws=wb.Sheets[wb.SheetNames[0]];
        if(!ws){showAccountStatus('엑셀 시트를 찾을 수 없습니다.','error');return;}
        const arr=XLSX.utils.sheet_to_json(ws,{defval:''});
        if(!arr||!arr.length){showAccountStatus('엑셀에 데이터가 없습니다.','error');return;}
        rawData=arr.map(row=>{
          const o={};
          for(const k of Object.keys(row)){
            const tk=(k||'').replace(/\uFEFF/g,'').trim();
            const v=row[k];
            o[tk]=(v instanceof Date)?v:((typeof v==='number'&&!isNaN(v))?v:(v!==null&&v!==undefined?String(v).trim():''));
          }
          return o;
        });
        if(!rawData.length){showAccountStatus('데이터가 없습니다.','error');return;}
        const dateKey=findColumn(rawData,['기표일자','기표 일자','일자','날짜']);
        if(!dateKey){showAccountStatus('기표일자 컬럼을 찾을 수 없습니다.','error');return;}
        const monthSet=new Set();rawData.forEach(r=>{const m=extractMonth(r[dateKey]);if(m)monthSet.add(m);});
        const months=[...monthSet].sort();
        if(months.length<2){showAccountStatus('최소 2개월 이상 데이터가 필요합니다.','error');return;}
        showAccountStatus(`파일 로드 완료: ${rawData.length}행, ${months.length}개월`,'info');
        analyzeData(months,dateKey);
        document.getElementById('accountReuploadBtn').style.display='inline-block';
      }catch(err){showAccountStatus('엑셀 파일을 읽는 중 오류가 발생했습니다. '+err.message,'error');}
    };
    reader.readAsArrayBuffer(file);
    return;
  }

  const reader=new FileReader();
  reader.onerror=function(){ statusDiv.querySelector('.loading')?.remove(); statusDiv.innerHTML=''; statusDiv.style.display='block'; showAccountStatus('파일을 읽을 수 없습니다.','error'); };
  reader.onload=function(ev){
    try{
      let text=ev.target.result.replace(/^\uFEFF/,'');
      const delim=detectDelimiter(text);
      const csvLines=parseCSV(text,delim);
      if(csvLines.length<2){showAccountStatus('CSV 형식이 올바르지 않습니다.','error');return;}
      rawData=csvToObjects(csvLines);
      if(!rawData.length){showAccountStatus('데이터가 없습니다.','error');return;}
      const dateKey=findColumn(rawData,['기표일자','기표 일자','일자','날짜']);
      if(!dateKey){showAccountStatus('기표일자 컬럼을 찾을 수 없습니다.','error');return;}
      const monthSet=new Set();rawData.forEach(r=>{const m=extractMonth(r[dateKey]);if(m)monthSet.add(m);});
      const months=[...monthSet].sort();
      if(months.length<2){showAccountStatus('최소 2개월 이상 데이터가 필요합니다.','error');return;}
      showAccountStatus(`파일 로드 완료: ${rawData.length}행, ${months.length}개월`,'info');
      analyzeData(months,dateKey);
      document.getElementById('accountReuploadBtn').style.display='inline-block';
    }catch(err){showAccountStatus('파일 읽기 오류: '+err.message,'error');}
    statusDiv.querySelector('.loading')?.remove();
  };
  reader.readAsText(file,'UTF-8');
}
document.getElementById('accountFileInput').addEventListener('change',function(e){ const file=e.target.files[0]; if(file) accountHandleAccountFile(file); });
document.getElementById('accountReuploadBtn').addEventListener('click',function(){
  rawData=[]; analysisResults=null; sortState={column:'diff',direction:'desc'};
  accountColumnGubun=false; accountColumnCostAsset=false;
  const statusEl=document.getElementById('accountStatus'); statusEl.innerHTML=''; statusEl.style.display='none';
  document.getElementById('accountFileInput').value='';
  document.getElementById('accountResults').innerHTML='';
  document.getElementById('accountSummaryTbody').innerHTML='';
  document.querySelectorAll('#accountSummaryTable th.sortable .sort-indicator').forEach(s=>{s.textContent='';});
  document.getElementById('accountReuploadBtn').style.display='none';
  document.getElementById('accountTabBtnDetailed').classList.add('active');
  document.getElementById('accountTabBtnSummary').classList.remove('active');
  document.getElementById('accountViewDetailed').style.display='block';
  document.getElementById('accountViewSummary').style.display='none';
  renderAccountGubunCostAssetSummary();
});

function analyzeData(months,dateKey){
  try{
    let amountKey=findColumn(rawData,['계정과목에 대한 금액'],{excludes:['계정과목']});
    if(!amountKey||isEmptyColumn(rawData,amountKey))amountKey=findColumn(rawData,['금액'],{excludes:['계정과목']});
    if(!amountKey){showAccountStatus('금액 컬럼을 찾을 수 없습니다.','error');return;}
    const accountKey=findColumn(rawData,['계정과목'],{excludes:['금액','계정과목에 대한 금액']});
    if(!accountKey){showAccountStatus('계정과목 컬럼을 찾을 수 없습니다.','error');return;}
    const memoKey=findColumn(rawData,['적요']);
    const gubunKey=findColumn(rawData,['구분']);
    const costAssetKey=findColumn(rawData,['비용/자산','비용자산','비용']);
    accountColumnGubun=!!gubunKey;
    accountColumnCostAsset=!!costAssetKey;
    const accountMeta={};
    rawData.forEach(r=>{
      const acc=String(r[accountKey]||'').trim()||'(계정과목없음)';
      if(!accountMeta[acc])accountMeta[acc]={gubun:gubunKey?String(r[gubunKey]??'').trim():'',costAsset:costAssetKey?String(r[costAssetKey]??'').trim():''};
    });
    const results=[];
    for(let i=0;i<months.length-1;i++){
      const prev=months[i],curr=months[i+1];
      const pd=rawData.filter(r=>extractMonth(r[dateKey])===prev);
      const cd=rawData.filter(r=>extractMonth(r[dateKey])===curr);
      const pba=groupByAccount(pd,accountKey,amountKey);
      const cba=groupByAccount(cd,accountKey,amountKey);
      const pbam=groupByAccountMemo(pd,accountKey,amountKey,memoKey);
      const cbam=groupByAccountMemo(cd,accountKey,amountKey,memoKey);
      const allAcc=new Set([...Object.keys(pba),...Object.keys(cba)]);
      const monthResults=[];
      allAcc.forEach(acc=>{
        const ps=pba[acc]||0,cs=cba[acc]||0,diff=cs-ps;if(diff===0)return;
        const pm=pbam[acc]||{},cm=cbam[acc]||{};
        const allMemos=new Set([...Object.keys(pm),...Object.keys(cm)]);
        const memoDiffs=[];
        allMemos.forEach(m=>{const pv=pm[m]||0,cv=cm[m]||0,md=cv-pv;if(md!==0)memoDiffs.push({memo:m||'(적요없음)',diff:md});});
        const grouped={};memoDiffs.forEach(m=>{const n=normalizeMemo(m.memo);grouped[n]=(grouped[n]||0)+m.diff;});
        const gd=Object.entries(grouped).filter(([,d])=>d!==0).map(([memo,diff])=>({memo,diff}));
        const tol=Math.max(CONSTANTS.DIFF_TOLERANCE_BASE,Math.abs(diff)*CONSTANTS.DIFF_TOLERANCE_RATIO);
        const hasMismatch=Math.abs(gd.reduce((s,m)=>s+m.diff,0)-diff)>tol;
        gd.forEach(m=>{m.contributionRatio=diff!==0&&Math.abs(diff)>CONSTANTS.MIN_DIFF_FOR_RATIO?parseFloat((m.diff/diff*100).toFixed(1)):0;});
        gd.sort((a,b)=>b.diff-a.diff);
        const meta=accountMeta[acc||'(계정과목없음)']||{gubun:'',costAsset:''};
        monthResults.push({account:acc||'(계정과목없음)',prevSum:ps,currSum:cs,diff,memoDiffs:gd,hasMismatch,gubun:meta.gubun,costAsset:meta.costAsset});
      });
      monthResults.sort((a,b)=>Math.abs(b.diff)-Math.abs(a.diff));
      results.push({prevMonth:prev,currMonth:curr,data:monthResults});
    }
    analysisResults=results;
    displayAccountResults(results);
    renderAccountSummaryTable();
  }catch(err){showAccountStatus('분석 오류: '+err.message,'error');}
}

function parseMonthSortKey(label){
  const m=(label||'').match(/^(\d+)\s*년\s*(\d+)\s*월$/);
  if(!m)return 0;
  return parseInt(m[1],10)*12+parseInt(m[2],10);
}
function computeGubunCostAssetSummary(){
  if(!analysisResults||!analysisResults.length)return{byMonth:{}};
  const byMonth={};
  analysisResults.forEach(pair=>{
    const key=`${pair.prevMonth}→${pair.currMonth}`;
    const byGubun={};
    let totalCostPrev=0,totalCostCurr=0,totalCostDiff=0,totalAssetPrev=0,totalAssetCurr=0,totalAssetDiff=0;
    pair.data.forEach(item=>{
      const gubun=String(item.gubun||'').trim()||'(미지정)';
      const isAsset=(String(item.costAsset||'').trim()).indexOf('자산')>=0;
      const p=item.prevSum||0,c=item.currSum||0,d=item.diff||0;
      if(!byGubun[gubun])byGubun[gubun]={costPrev:0,costCurr:0,costDiff:0,assetPrev:0,assetCurr:0,assetDiff:0};
      if(isAsset){byGubun[gubun].assetPrev+=p;byGubun[gubun].assetCurr+=c;byGubun[gubun].assetDiff+=d;totalAssetPrev+=p;totalAssetCurr+=c;totalAssetDiff+=d;}
      else{byGubun[gubun].costPrev+=p;byGubun[gubun].costCurr+=c;byGubun[gubun].costDiff+=d;totalCostPrev+=p;totalCostCurr+=c;totalCostDiff+=d;}
    });
    const rows=Object.entries(byGubun).sort((a,b)=>a[0].localeCompare(b[0],'ko')).map(([gubun,o])=>({
      gubun,
      costPrev:o.costPrev,costCurr:o.costCurr,costDiff:o.costDiff,
      assetPrev:o.assetPrev,assetCurr:o.assetCurr,assetDiff:o.assetDiff,
      totalPrev:o.costPrev+o.assetPrev,totalCurr:o.costCurr+o.assetCurr,totalDiff:o.costDiff+o.assetDiff
    }));
    rows.push({gubun:'전체 합계',costPrev:totalCostPrev,costCurr:totalCostCurr,costDiff:totalCostDiff,assetPrev:totalAssetPrev,assetCurr:totalAssetCurr,assetDiff:totalAssetDiff,totalPrev:totalCostPrev+totalAssetPrev,totalCurr:totalCostCurr+totalAssetCurr,totalDiff:totalCostDiff+totalAssetDiff});
    byMonth[key]=rows;
  });
  return{byMonth};
}
const GUBUN_TO_BASIC={
  '전산 유지보수':'유지보수',
  '전산유지보수':'유지보수',
  '정보시스템 개선':'정보',
  '인프라 개선':'인프라',
  '유지보수':'유지보수',
  '정보':'정보',
  '인프라':'인프라'
};
const BASIC_ORDER=['유지보수','정보','인프라'];
function toBasicKey(gubun){
  const s=String(gubun||'').trim();
  return GUBUN_TO_BASIC[s]||null;
}
function toBasicKeyFromAccount(accountName){
  const s=String(accountName||'').trim();
  if(!s)return null;
  if(s.includes('전산 유지보수'))return'유지보수';
  if(s.includes('정보시스템 개선'))return'정보';
  if(s.includes('인프라 개선'))return'인프라';
  return null;
}
function toMonthLabelYYYYMM(ym, maxYear){
  if(!ym||typeof ym!=='string')return null;
  const parts=ym.split('-');
  const y=parseInt(parts[0],10),m=parseInt(parts[1],10);
  if(isNaN(y)||isNaN(m)||y!==maxYear||m<1||m>12)return null;
  return String(y).slice(-2)+'년 '+m+'월';
}
function add증감증감율(row,months){
  const last=months.length>=1?(row[months[months.length-1]]||0):0;
  const secondLast=months.length>=2?(row[months[months.length-2]]||0):0;
  row.증감=months.length>=2?last-secondLast:0;
  row.증감율=months.length>=2?(secondLast===0?'-':(Math.round((row.증감/secondLast)*1000)/10+'%')):'-';
}
function computeGubunCostAssetSummaryPivot(){
  if(!analysisResults||!analysisResults.length)return{months:[],rowsBasic:[],rowsCost:[]};
  let maxYear=0;
  analysisResults.forEach(pair=>{
    [pair.prevMonth,pair.currMonth].forEach(ym=>{
      if(ym&&typeof ym==='string'){const y=parseInt(ym.split('-')[0],10);if(!isNaN(y)&&y>maxYear)maxYear=y;}
    });
  });
  if(!maxYear)maxYear=new Date().getFullYear();
  const yearShort=String(maxYear).slice(-2);
  const months=Array.from({length:12},(_,i)=>yearShort+'년 '+(i+1)+'월');
  const byGubunBasic={유지보수:Object.fromEntries(months.map(m=>[m,0])),정보:Object.fromEntries(months.map(m=>[m,0])),인프라:Object.fromEntries(months.map(m=>[m,0]))};
  const totalByMonth=Object.fromEntries(months.map(m=>[m,0]));
  analysisResults.forEach(pair=>{
    const prevLabel=toMonthLabelYYYYMM(pair.prevMonth,maxYear),currLabel=toMonthLabelYYYYMM(pair.currMonth,maxYear);
    pair.data.forEach(item=>{
      const p=item.prevSum||0,c=item.currSum||0;
      const basicKey=toBasicKeyFromAccount(item.account);
      if(basicKey&&byGubunBasic[basicKey]){
        if(prevLabel)byGubunBasic[basicKey][prevLabel]=(byGubunBasic[basicKey][prevLabel]||0)+p;
        if(currLabel)byGubunBasic[basicKey][currLabel]=(byGubunBasic[basicKey][currLabel]||0)+c;
      }
      if(prevLabel)totalByMonth[prevLabel]=(totalByMonth[prevLabel]||0)+p;
      if(currLabel)totalByMonth[currLabel]=(totalByMonth[currLabel]||0)+c;
    });
  });
  const rowsBasic=[];
  BASIC_ORDER.forEach(gubun=>{
    const row={gubun};
    months.forEach(m=>{row[m]=byGubunBasic[gubun][m]||0;});
    add증감증감율(row,months);
    rowsBasic.push(row);
  });
  const totalRow={gubun:'전체 합계'};
  months.forEach(m=>{totalRow[m]=rowsBasic.reduce((s,r)=>s+(r[m]||0),0);});
  add증감증감율(totalRow,months);
  rowsBasic.push(totalRow);
  const costRow={gubun:'글로벌전산팀'};
  months.forEach(m=>{costRow[m]=totalByMonth[m]||0;});
  add증감증감율(costRow,months);
  const rowsCost=[costRow];
  return{months,rowsBasic,rowsCost};
}

function displayAccountResults(results){
  const div=document.getElementById('accountResults');div.innerHTML='';
  if(!results.length){div.innerHTML='<p>비교할 데이터가 없습니다.</p>';return;}
  const gubunTh=accountColumnGubun?'<th>구분</th>':'';

  results.forEach(mr=>{
    const sec=document.createElement('div');sec.className='month-section';
    sec.appendChild(Object.assign(document.createElement('div'),{className:'month-header',textContent:`기표월: ${mr.prevMonth} → ${mr.currMonth}`}));
    if(!mr.data.length){sec.appendChild(document.createTextNode('변동이 있는 계정과목이 없습니다.'));div.appendChild(sec);return;}
    const table=document.createElement('table');
    table.innerHTML=`<thead><tr><th>월</th><th>계정과목</th>${gubunTh}${costTh}<th>전월금액</th><th>차월금액</th><th>차이</th><th>적요(차이 발생 내역)</th></tr></thead><tbody></tbody>`;
    const tbody=table.querySelector('tbody');
    mr.data.forEach(item=>{
      const ml=item.memoDiffs.map(m=>(m.diff>=0?'+':'')+formatNumber(m.diff)+' '+m.memo).join('<br>');
      const gubunTd=accountColumnGubun?`<td>${escapeHtml(item.gubun||'')}</td>`:'';
      const costTd=accountColumnCostAsset?`<td>${escapeHtml(item.costAsset||'')}</td>`:'';
      const diffIcon=item.diff>=0?'▲':'▼';
      const row=tbody.insertRow();
      row.innerHTML=`<td>${mr.prevMonth}→${mr.currMonth}</td><td>${escapeHtml(item.account||'')}</td>${gubunTd}${costTd}<td class="number">${formatNumber(item.prevSum)}</td><td class="number">${formatNumber(item.currSum)}</td><td class="number ${item.diff>=0?'positive':'negative'}">${diffIcon} ${formatNumber(item.diff)}</td><td class="memo-list">${ml||'-'}</td>`;
    });
    const w=document.createElement('div');w.className='table-wrapper';w.appendChild(table);sec.appendChild(w);
    if(summary&&summary.byMonth){
      const key=`${mr.prevMonth}→${mr.currMonth}`;
      const rows=summary.byMonth[key];
      if(rows&&rows.length){
        const cap=document.createElement('div');cap.className='month-header';cap.style.marginTop='16px';cap.style.fontSize='0.95rem';cap.textContent='구분별 비용·자산 현황';
        sec.appendChild(cap);
        const t2=document.createElement('table');t2.className='account-gubun-cost-table';
        t2.innerHTML='<thead><tr><th>구분</th><th class="number">비용(전월)</th><th class="number">비용(차월)</th><th class="number">비용(차이)</th><th class="number">자산(전월)</th><th class="number">자산(차월)</th><th class="number">자산(차이)</th><th class="number">소계(전월)</th><th class="number">소계(차월)</th><th class="number">소계(차이)</th></tr></thead><tbody></tbody>';
        const tb2=t2.querySelector('tbody');
        rows.forEach(r=>{
          const tr=tb2.insertRow();if(r.gubun==='전체 합계')tr.className='account-gubun-total-row';
          const costDiffCls=r.costDiff>=0?'positive':'negative';const assetDiffCls=r.assetDiff>=0?'positive':'negative';const totalDiffCls=r.totalDiff>=0?'positive':'negative';
          tr.innerHTML=`<td>${escapeHtml(r.gubun||'')}</td><td class="number">${formatNumber(r.costPrev)}</td><td class="number">${formatNumber(r.costCurr)}</td><td class="number ${costDiffCls}">${formatNumber(r.costDiff)}</td><td class="number">${formatNumber(r.assetPrev)}</td><td class="number">${formatNumber(r.assetCurr)}</td><td class="number ${assetDiffCls}">${formatNumber(r.assetDiff)}</td><td class="number">${formatNumber(r.totalPrev)}</td><td class="number">${formatNumber(r.totalCurr)}</td><td class="number ${totalDiffCls}">${formatNumber(r.totalDiff)}</td>`;
        });
        const w2=document.createElement('div');w2.className='table-wrapper';w2.appendChild(t2);sec.appendChild(w2);
      }
    }
    div.appendChild(sec);
  });
}

function renderAccountSummaryTable(){
  const tbody=document.getElementById('accountSummaryTbody');tbody.innerHTML='';
  if(!analysisResults||!analysisResults.length){renderAccountGubunCostAssetSummary();return;}
  const diffF=document.getElementById('accountSummaryDiffFilter').value;
  const minAbs=Number(document.getElementById('accountSummaryMinAbsDiff').value||0);
  const rows=[];
  for(const pair of analysisResults){
    const mp=`${pair.prevMonth} → ${pair.currMonth}`;
    for(const item of pair.data){
      const diff=item.diff||0;if(Math.abs(diff)<minAbs)continue;if(diffF==='inc'&&diff<=0)continue;if(diffF==='dec'&&diff>=0)continue;
      const cm=getChangedMemos(item.memoDiffs);
      rows.push({monthPair:mp,account:item.account,prevSum:item.prevSum,currSum:item.currSum,diff,top3Html:calculateTop3Memos(cm,'<br>',true),memoCount:cm.length,hasMismatch:item.hasMismatch||false,gubun:item.gubun||'',costAsset:item.costAsset||''});
    }
  }
  rows.sort((a,b)=>{switch(sortState.column){case'account':return sortState.direction==='asc'?a.account.localeCompare(b.account,'ko'):b.account.localeCompare(a.account,'ko');default:const av=Math.abs(a[sortState.column]??a.diff),bv=Math.abs(b[sortState.column]??b.diff);return sortState.direction==='asc'?av-bv:bv-av;}});
  const tbl=document.getElementById('accountSummaryTable');
  tbl.classList.toggle('show-gubun',accountColumnGubun);
  tbl.classList.toggle('show-cost',accountColumnCostAsset);
  rows.forEach(r=>{
    const tr=tbody.insertRow();
    const gubunTd=accountColumnGubun?`<td class="account-opt-gubun">${escapeHtml(r.gubun||'')}</td>`:'';
    const costTd=accountColumnCostAsset?`<td class="account-opt-cost">${escapeHtml(r.costAsset||'')}</td>`:'';
    const diffIcon=r.diff>=0?'▲':'▼';
    tr.innerHTML=`<td>${r.monthPair}</td><td>${escapeHtml(r.account||'')}${r.hasMismatch?'<span class="warning-badge">⚠️</span>':''}</td>${gubunTd}${costTd}<td class="number">${formatNumber(r.prevSum)}</td><td class="number">${formatNumber(r.currSum)}</td><td class="number ${r.diff>=0?'positive':'negative'}">${diffIcon} ${formatNumber(r.diff)}</td><td class="memo-list">${r.top3Html}</td><td class="number">${r.memoCount}</td>`;
  });
  renderAccountGubunCostAssetSummary();
}

function renderAccountGubunCostAssetSummary(){
  const block=document.getElementById('accountGubunCostAssetBlock');
  const basicThead=document.getElementById('accountGubunBasicTheadRow');
  const basicTbody=document.getElementById('accountGubunBasicTbody');
  const costThead=document.getElementById('accountGubunCostStatusTheadRow');
  const costTbody=document.getElementById('accountGubunCostStatusTbody');
  if(!block||!basicThead||!basicTbody||!costThead||!costTbody)return;
  if(!accountColumnGubun||!accountColumnCostAsset){block.style.display='none';basicThead.innerHTML='';basicTbody.innerHTML='';costThead.innerHTML='';costTbody.innerHTML='';return;}
  if(!analysisResults||!analysisResults.length){block.style.display='none';basicThead.innerHTML='';basicTbody.innerHTML='';costThead.innerHTML='';costTbody.innerHTML='';return;}
  const pivot=computeGubunCostAssetSummaryPivot();
  if(!pivot.months.length||!pivot.rowsBasic.length){block.style.display='none';basicThead.innerHTML='';basicTbody.innerHTML='';costThead.innerHTML='';costTbody.innerHTML='';return;}

  basicTbody.innerHTML='';
  pivot.rowsBasic.forEach(r=>{
    const tr=basicTbody.insertRow();
    if(r.gubun==='전체 합계')tr.className='account-gubun-total-row';

  });
  costThead.innerHTML='<th>구분</th>'+pivot.months.map(m=>'<th class="number">'+escapeHtml(m)+'</th>').join('')+'<th class="number">증감</th><th>증감율</th><th>증감 원인</th>';
  costTbody.innerHTML='';
  pivot.rowsCost.forEach(r=>{
    const tr=costTbody.insertRow();
    const diffCls=r.증감>=0?'positive':'negative';
    const monthCells=pivot.months.map(m=>'<td class="number">'+formatNumber(r[m]||0)+'</td>').join('');
    const rateStr=typeof r.증감율==='string'?escapeHtml(r.증감율):r.증감율;
    tr.innerHTML='<td>'+escapeHtml(r.gubun)+'</td>'+monthCells+'<td class="number '+diffCls+'">'+formatNumber(r.증감)+'</td><td class="number">'+rateStr+'</td><td></td>';
  });
}

function downloadAccountSummaryCsv(){
  if(!analysisResults||!analysisResults.length)return;
  const diffF=document.getElementById('accountSummaryDiffFilter').value;
  const minAbs=Number(document.getElementById('accountSummaryMinAbsDiff').value||0);
  const headerRow=['월쌍','계정과목'];if(accountColumnGubun)headerRow.push('구분');if(accountColumnCostAsset)headerRow.push('비용/자산');headerRow.push('전월금액','차월금액','차이','주요원인Top3','적요건수');
  const rows=[headerRow];
  for(const pair of analysisResults){
    const mp=`${pair.prevMonth} → ${pair.currMonth}`;
    for(const item of pair.data){
      const diff=item.diff||0;if(Math.abs(diff)<minAbs)continue;if(diffF==='inc'&&diff<=0)continue;if(diffF==='dec'&&diff>=0)continue;
      const row=[mp,item.account];if(accountColumnGubun)row.push(item.gubun||'');if(accountColumnCostAsset)row.push(item.costAsset||'');row.push(item.prevSum,item.currSum,diff,calculateTop3Memos(getChangedMemos(item.memoDiffs),' / ',true),getChangedMemos(item.memoDiffs).length);
      rows.push(row);
    }
  }
  const csv='\uFEFF'+rows.map(r=>r.map(c=>'"'+String(c??'').replace(/"/g,'""')+'"').join(',')).join('\n');
  const a=document.createElement('a');a.href=URL.createObjectURL(new Blob([csv],{type:'text/csv;charset=utf-8;'}));a.download=`요약보고서_${new Date().toISOString().slice(0,10)}.csv`;a.click();
}
